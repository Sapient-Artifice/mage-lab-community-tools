<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Mage Scheduler</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1 { text-align: center; }
        .muted { color: #777; font-size: 0.9em; }
        input, textarea { width: 100%; }
        fieldset { border: 1px solid #ddd; padding: 12px; border-radius: 6px; }
    </style>
</head>
<body>
    <h1>Settings</h1>
    <p class="muted"><a href="/">Back to tasks</a> | <a href="/actions">Actions</a></p>
    {% if error %}
        <p style="color: #b00020;">Error: {{ error }}</p>
    {% endif %}
    <form action="/settings" method="post">
        <fieldset>
            <legend>Global Directory Allowlist</legend>
            <div style="margin-bottom: 8px;">
                <label for="allowed_command_dirs">Allowed Command Dirs (comma-separated)</label><br>
                <input id="allowed_command_dirs" name="allowed_command_dirs" type="text" value="{{ form.allowed_command_dirs if form else ((settings.allowed_command_dirs or []) | join(', ')) }}" placeholder="/usr/local/bin,/opt/mage/scripts">
            </div>
            <div style="margin-bottom: 8px;">
                <label for="allowed_cwd_dirs">Allowed CWD Dirs (comma-separated)</label><br>
                <input id="allowed_cwd_dirs" name="allowed_cwd_dirs" type="text" value="{{ form.allowed_cwd_dirs if form else ((settings.allowed_cwd_dirs or []) | join(', ')) }}" placeholder="/home/user,/opt/mage">
            </div>
            <button type="submit">Save Settings</button>
        </fieldset>
        <fieldset style="margin-top:16px">
            <legend>Auto-Cleanup</legend>
            <label>
                <input type="checkbox" name="cleanup_enabled" value="1" id="cleanup_enabled"
                       {% if settings.cleanup_enabled %}checked{% endif %}>
                Enable auto-cleanup of old completed tasks (runs daily)
            </label>
            <div id="retention-days-row" style="margin-top:8px; display:{% if settings.cleanup_enabled %}block{% else %}none{% endif %}">
                <label for="task_retention_days">Retention days</label><br>
                <input type="number" name="task_retention_days" id="task_retention_days"
                       value="{{ settings.task_retention_days or 30 }}" min="1" max="3650" style="width:80px">
                <small style="margin-left:6px">days (default: 30). Tasks with <em>retain result</em> are never deleted.</small>
            </div>
        </fieldset>
    </form>
    <script>
        document.getElementById('cleanup_enabled').addEventListener('change', function() {
            document.getElementById('retention-days-row').style.display = this.checked ? 'block' : 'none';
        });
    </script>
</body>
</html>
