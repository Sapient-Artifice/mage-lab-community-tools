<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Action - Mage Scheduler</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1 { text-align: center; }
        .muted { color: #777; font-size: 0.9em; }
        input, textarea { width: 100%; }
        fieldset { border: 1px solid #ddd; padding: 12px; border-radius: 6px; }
    </style>
</head>
<body>
    <h1>New Action</h1>
    <p class="muted"><a href="/actions">Back to actions</a></p>
    {% if error %}
        <p style="color: #b00020;">Error: {{ error }}</p>
    {% endif %}
    <form action="/actions/new" method="post">
        <fieldset>
            <legend>Create Action</legend>
            <div style="margin-bottom: 8px;">
                <label for="name">Name</label><br>
                <input id="name" name="name" type="text" required placeholder="backup_home" value="{{ form.name if form else '' }}">
            </div>
            <div style="margin-bottom: 8px;">
                <label for="description">Description</label><br>
                <input id="description" name="description" type="text" placeholder="Optional description" value="{{ form.description if form else '' }}">
            </div>
            <div style="margin-bottom: 8px;">
                <label for="command">Command</label><br>
                <input id="command" name="command" type="text" required placeholder="/usr/local/bin/backup_home.sh" value="{{ form.command if form else '' }}">
            </div>
            <div style="margin-bottom: 8px;">
                <label for="default_cwd">Default Working Directory</label><br>
                <input id="default_cwd" name="default_cwd" type="text" placeholder="/path/to/working/dir" value="{{ form.default_cwd if form else '' }}">
            </div>
            <div style="margin-bottom: 8px;">
                <label for="allowed_env">Allowed Env Vars (comma-separated)</label><br>
                <input id="allowed_env" name="allowed_env" type="text" placeholder="API_TOKEN,PROJECT_ID" value="{{ form.allowed_env if form else '' }}">
            </div>
            <div style="margin-bottom: 8px;">
                <label for="allowed_command_dirs">Allowed Command Dirs (comma-separated)</label><br>
                <input id="allowed_command_dirs" name="allowed_command_dirs" type="text" placeholder="/usr/local/bin,/opt/mage/scripts" value="{{ form.allowed_command_dirs if form else '' }}">
            </div>
            <div style="margin-bottom: 8px;">
                <label for="allowed_cwd_dirs">Allowed CWD Dirs (comma-separated)</label><br>
                <input id="allowed_cwd_dirs" name="allowed_cwd_dirs" type="text" placeholder="/home/bard,/opt/mage" value="{{ form.allowed_cwd_dirs if form else '' }}">
            </div>
            <div style="margin-bottom: 8px;">
                <label for="max_retries">Max Retries</label><br>
                <input id="max_retries" name="max_retries" type="number" min="0" max="10" value="{{ form.max_retries if form else 0 }}">
                <span class="muted">Retry count on failure (0 = no retry)</span>
            </div>
            <div style="margin-bottom: 8px;">
                <label for="retry_delay">Retry Delay (seconds)</label><br>
                <input id="retry_delay" name="retry_delay" type="number" min="1" value="{{ form.retry_delay if form else 60 }}">
                <span class="muted">Seconds between retry attempts</span>
            </div>
            <button type="submit">Create Action</button>
        </fieldset>
    </form>
</body>
</html>
