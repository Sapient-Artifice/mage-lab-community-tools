<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GPU Monitoring Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.3.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1 { text-align: center; }
        #gpuUtilChart, #gpuMemoryChart {
            display: block;
            max-width: 900px;
            width: 100%;
            height: 450px;
            margin: 30px auto;
        }
        #controls { text-align: center; margin-bottom: 20px; }
        button, input[type="file"] { margin: 0 10px; padding: 10px 20px; font-size: 1rem; }
        #timeRangeControls { max-width: 900px; margin: 0 auto 20px; text-align: center; }
        #timeRangeControls label { margin: 0 10px; font-weight: bold; }
        #timeRangeControls input { padding: 5px; font-size: 1rem; }
    </style>
</head>
<body>
    <h1>GPU Monitoring Dashboard</h1>

    <div id="controls">
        <input type="file" id="csvFileInput" accept=".csv" />
        <button id="updateButton">Update Data</button>
    </div>

    <div id="timeRangeControls">
        <label for="startTime">Start Time:</label>
        <input type="datetime-local" id="startTime" />
        <label for="endTime">End Time:</label>
        <input type="datetime-local" id="endTime" />
    </div>

    <canvas id="gpuUtilChart"></canvas>
    <canvas id="gpuMemoryChart"></canvas>

    <script>
        let rawData = null;
        let gpuUtilChart = null;
        let gpuMemoryChart = null;

        function parseAndPlot(data) {
            // Get filter times from inputs
            const startInput = document.getElementById('startTime').value;
            const endInput = document.getElementById('endTime').value;
            const startTime = startInput ? new Date(startInput) : null;
            const endTime = endInput ? new Date(endInput) : null;

            // Filter and parse data
            const filteredData = data.filter(row => {
                const tsRaw = row.timestamp ? row.timestamp.trim() : null;
                if (!tsRaw) return false;
                const ts = tsRaw.endsWith('Z') ? tsRaw : tsRaw + 'Z';
                const d = new Date(ts);
                if (isNaN(d)) return false;

                if (startTime && d < startTime) return false;
                if (endTime && d > endTime) return false;

                return true;
            });

            const labels = filteredData.map(row => {
                const tsRaw = row.timestamp.trim();
                const ts = tsRaw.endsWith('Z') ? tsRaw : tsRaw + 'Z';
                return new Date(ts).toLocaleTimeString();
            });

            const utilization = filteredData.map(row => row.gpu_0_utilization_percent);
            const memoryUsed = filteredData.map(row => row.gpu_0_memory_used_mb);
            const memoryFree = filteredData.map(row => row.gpu_0_memory_free_mb);

            if (gpuUtilChart) {
                gpuUtilChart.data.labels = labels;
                gpuUtilChart.data.datasets[0].data = utilization;
                gpuUtilChart.update();
            } else {
                const ctxUtil = document.getElementById('gpuUtilChart').getContext('2d');
                gpuUtilChart = new Chart(ctxUtil, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'GPU Utilization (%)',
                            data: utilization,
                            borderColor: 'blue',
                            backgroundColor: 'rgba(0, 0, 255, 0.1)',
                            fill: true,
                            tension: 0.2,
                            pointRadius: 3,
                            pointHoverRadius: 6
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            y: { beginAtZero: true, max: 100 },
                            x: { display: true, title: { display: true, text: 'Time' } }
                        },
                        plugins: {
                            legend: { display: true },
                            title: { display: true, text: 'GPU Utilization Over Time' },
                            tooltip: { mode: 'index', intersect: false }
                        },
                        interaction: { mode: 'nearest', axis: 'x', intersect: false }
                    }
                });
            }

            if (gpuMemoryChart) {
                gpuMemoryChart.data.labels = labels;
                gpuMemoryChart.data.datasets[0].data = memoryUsed;
                gpuMemoryChart.data.datasets[1].data = memoryFree;
                gpuMemoryChart.update();
            } else {
                const ctxMem = document.getElementById('gpuMemoryChart').getContext('2d');
                gpuMemoryChart = new Chart(ctxMem, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                label: 'Memory Used (MB)',
                                data: memoryUsed,
                                borderColor: 'red',
                                backgroundColor: 'rgba(255, 0, 0, 0.1)',
                                fill: true,
                                tension: 0.2,
                                pointRadius: 3,
                                pointHoverRadius: 6
                            },
                            {
                                label: 'Memory Free (MB)',
                                data: memoryFree,
                                borderColor: 'green',
                                backgroundColor: 'rgba(0, 255, 0, 0.1)',
                                fill: true,
                                tension: 0.2,
                                pointRadius: 3,
                                pointHoverRadius: 6
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            y: { beginAtZero: true },
                            x: { display: true, title: { display: true, text: 'Time' } }
                        },
                        plugins: {
                            legend: { display: true },
                            title: { display: true, text: 'GPU Memory Used and Free Over Time' },
                            tooltip: { mode: 'index', intersect: false }
                        },
                        interaction: { mode: 'nearest', axis: 'x', intersect: false }
                    }
                });
            }
        }

        document.getElementById('csvFileInput').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                Papa.parse(e.target.result, {
                    header: true,
                    dynamicTyping: true,
                    complete: function(results) {
                        rawData = results.data;
                        parseAndPlot(rawData);
                    },
                    error: function(err) {
                        alert('Failed to parse CSV: ' + err.message);
                    }
                });
            };
            reader.readAsText(file);
        });

        document.getElementById('updateButton').addEventListener('click', function() {
            if (!rawData) {
                alert('Please load a CSV file first.');
                return;
            }
            parseAndPlot(rawData);
        });
    </script>
</body>
</html>
