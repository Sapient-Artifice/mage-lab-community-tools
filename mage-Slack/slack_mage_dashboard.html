<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Slack Mage Dashboard</title>
    <style>
      :root {
        --bg: #0f172a;
        --bg-accent: #12213f;
        --card: #0b1328;
        --card-border: #25365c;
        --ink: #e2e8f0;
        --muted: #94a3b8;
        --accent: #f59e0b;
        --accent-2: #38bdf8;
        --danger: #ef4444;
        --ok: #22c55e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Trebuchet MS", "Lucida Sans Unicode", "Lucida Grande", sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at top left, #1e293b, var(--bg));
      }

      .shell {
        max-width: 1100px;
        margin: 0 auto;
        padding: 32px 20px 60px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
      }

      h1 {
        font-size: 28px;
        margin: 0;
        letter-spacing: 0.5px;
      }

      .tagline {
        color: var(--muted);
        font-size: 14px;
      }

      .grid {
        display: grid;
        gap: 18px;
      }

      .panel {
        background: linear-gradient(160deg, #0f1b36, var(--card));
        border: 1px solid var(--card-border);
        border-radius: 16px;
        padding: 18px;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.45);
      }

      .panel h2 {
        margin: 0 0 10px;
        font-size: 18px;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      button {
        background: var(--accent);
        border: none;
        color: #1f2937;
        padding: 8px 14px;
        border-radius: 999px;
        font-weight: 700;
        cursor: pointer;
      }

      button.secondary {
        background: #334155;
        color: var(--ink);
      }

      button.danger {
        background: var(--danger);
        color: white;
      }

      button.link {
        background: transparent;
        color: var(--accent-2);
        padding: 0;
      }

      .status-pill {
        padding: 6px 12px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        background: #1e293b;
        border: 1px solid var(--card-border);
      }

      .status-pill.running {
        background: rgba(34, 197, 94, 0.2);
        color: #86efac;
      }

      .status-pill.stopped {
        background: rgba(239, 68, 68, 0.2);
        color: #fda4af;
      }

      form {
        display: grid;
        gap: 12px;
      }

      label {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--muted);
      }

      input[type="text"],
      input[type="number"] {
        width: 100%;
        background: #0b142a;
        border: 1px solid var(--card-border);
        color: var(--ink);
        padding: 10px 12px;
        border-radius: 10px;
      }

      .row {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }

      .checkboxes {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
      }

      .checkboxes label {
        text-transform: none;
        letter-spacing: 0;
        font-size: 14px;
        color: var(--ink);
      }

      .rules {
        display: grid;
        gap: 12px;
      }

      .rule-card {
        background: #0b142a;
        border-radius: 12px;
        border: 1px solid var(--card-border);
        padding: 12px;
        display: grid;
        gap: 8px;
      }

      .rule-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        color: var(--muted);
        font-size: 12px;
      }

      .event-log {
        max-height: 240px;
        overflow: auto;
        display: grid;
        gap: 8px;
      }

      .event {
        background: #0b142a;
        border: 1px solid var(--card-border);
        border-radius: 10px;
        padding: 8px 10px;
        font-size: 12px;
        color: var(--muted);
      }

      .event-meta {
        font-size: 11px;
        color: var(--muted);
      }

      .event-message {
        margin-top: 6px;
        color: var(--ink);
        white-space: pre-wrap;
      }

      .lookup-results {
        display: grid;
        gap: 6px;
        margin-top: 6px;
      }

      .lookup-item {
        background: #0b142a;
        border: 1px solid var(--card-border);
        border-radius: 8px;
        padding: 6px 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }

      .hint {
        font-size: 12px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header>
        <div>
          <h1>Slack Mage</h1>
          <div class="tagline">Surface what matters. Notify without reading messages.</div>
        </div>
        <div class="controls">
          <span id="listener-status" class="status-pill">Status: --</span>
          <button id="start-listener">Start Listener</button>
          <button id="stop-listener" class="secondary">Stop Listener</button>
        </div>
      </header>

      <div class="grid">
        <section class="panel">
          <h2>New Rule</h2>
          <form id="rule-form">
            <div class="row">
              <div>
                <label for="rule-name">Rule name</label>
                <input id="rule-name" type="text" placeholder="Sam in #general" required />
              </div>
              <div>
                <label for="event-type">Event type</label>
                <input id="event-type" type="text" value="message_posted" readonly />
              </div>
            </div>
            <div class="row">
              <div>
                <label>User search</label>
                <input id="user-query" type="text" placeholder="search by name" />
                <div class="controls">
                  <button type="button" class="secondary" id="user-lookup">Lookup</button>
                </div>
                <div id="user-results" class="lookup-results"></div>
              </div>
              <div>
                <label>User ID</label>
                <input id="user-id" type="text" placeholder="U123..." />
                <div class="hint">Leave empty to match any user.</div>
              </div>
            </div>
            <div class="row">
              <div>
                <label>Channel search</label>
                <input id="channel-query" type="text" placeholder="search by name" />
                <div class="controls">
                  <button type="button" class="secondary" id="channel-lookup">Lookup</button>
                </div>
                <div id="channel-results" class="lookup-results"></div>
              </div>
              <div>
                <label>Channel ID</label>
                <input id="channel-id" type="text" placeholder="C123..." />
                <div class="hint">Leave empty to match any channel.</div>
              </div>
            </div>
            <div class="checkboxes">
              <label><input id="rule-surface" type="checkbox" checked /> Surface on dashboard</label>
              <label><input id="rule-notify" type="checkbox" checked /> Notify assistant</label>
              <label><input id="rule-notify-message" type="checkbox" /> Include message in notification</label>
              <label><input id="rule-enabled" type="checkbox" checked /> Enabled</label>
            </div>
            <button type="submit">Save rule</button>
          </form>
        </section>

        <section class="panel">
          <h2>Rules</h2>
          <div id="rules-list" class="rules"></div>
        </section>

        <section class="panel">
          <h2>Recent Events</h2>
          <div class="controls">
            <button id="reset-state" class="secondary">Reset counters</button>
            <div class="hint">Metadata only (no message content).</div>
          </div>
          <div id="event-log" class="event-log"></div>
        </section>

        <section class="panel">
          <h2>Notification Settings</h2>
          <div class="row">
            <div>
              <label for="throttle-seconds">Throttle seconds</label>
              <input id="throttle-seconds" type="number" min="0" value="30" />
            </div>
            <div class="hint">Minimum delay between assistant notifications per rule.</div>
          </div>
          <button id="save-settings" class="secondary">Save settings</button>
        </section>
      </div>
    </div>

    <script>
      const token = new URLSearchParams(window.location.search).get("token");
      const apiBase = window.location.origin;
      const configState = { config: null, state: null };

      function apiFetch(path, options = {}) {
        if (!token) {
          return Promise.reject(new Error("Missing token. Check SLACK_MAGE_API_TOKEN."));
        }
        const headers = Object.assign(
          { "Content-Type": "application/json", "X-API-Token": token },
          options.headers || {}
        );
        return fetch(`${apiBase}${path}`, Object.assign({}, options, { headers }));
      }

      function statusPill(running) {
        const el = document.getElementById("listener-status");
        el.textContent = running ? "Listener: running" : "Listener: stopped";
        el.classList.toggle("running", running);
        el.classList.toggle("stopped", !running);
      }

      async function loadStatus() {
        const res = await apiFetch("/status");
        const data = await res.json();
        statusPill(Boolean(data.listener_running));
      }

      async function loadConfig() {
        const res = await apiFetch("/config");
        configState.config = await res.json();
      }

      async function loadState() {
        const res = await apiFetch("/state");
        configState.state = await res.json();
      }

      function renderRules() {
        const container = document.getElementById("rules-list");
        container.innerHTML = "";
        const rules = (configState.config && configState.config.rules) || [];
        if (!rules.length) {
          container.innerHTML = "<div class='hint'>No rules yet.</div>";
          return;
        }
        rules.forEach((rule) => {
          const card = document.createElement("div");
          card.className = "rule-card";
          const title = document.createElement("div");
          title.textContent = rule.name || rule.id;
          card.appendChild(title);

          const meta = document.createElement("div");
          meta.className = "rule-meta";
          meta.innerHTML = `
            <span>Event: ${rule.event_type}</span>
            <span>User: ${rule.user_id || "any"}</span>
            <span>Channel: ${rule.channel_id || "any"}</span>
            <span>Count: ${(configState.state && configState.state.event_counts && configState.state.event_counts[rule.id]) || 0}</span>
          `;
          card.appendChild(meta);

          const toggles = document.createElement("div");
          toggles.className = "controls";
          toggles.innerHTML = `
            <label><input type="checkbox" data-field="surface" ${rule.surface ? "checked" : ""} /> show</label>
            <label><input type="checkbox" data-field="notify_assistant" ${rule.notify_assistant ? "checked" : ""} /> Notify mage</label>
            <label><input type="checkbox" data-field="notify_include_message" ${rule.notify_include_message ? "checked" : ""} /> include message</label>
            <label><input type="checkbox" data-field="enabled" ${rule.enabled ? "checked" : ""} /> enabled</label>
            <button class="link" data-action="delete">delete</button>
          `;
          toggles.addEventListener("change", (event) => {
            const field = event.target.getAttribute("data-field");
            if (!field) return;
            rule[field] = event.target.checked;
            saveConfig();
          });
          toggles.addEventListener("click", (event) => {
            if (event.target.getAttribute("data-action") !== "delete") return;
            configState.config.rules = configState.config.rules.filter((r) => r.id !== rule.id);
            saveConfig();
          });
          card.appendChild(toggles);
          container.appendChild(card);
        });
      }

      function renderEvents() {
        const container = document.getElementById("event-log");
        container.innerHTML = "";
        const events = (configState.state && configState.state.recent_events) || [];
        if (!events.length) {
          container.innerHTML = "<div class='hint'>No events yet.</div>";
          return;
        }
        events
          .slice()
          .reverse()
          .forEach((event) => {
            const row = document.createElement("div");
            row.className = "event";
            const meta = document.createElement("div");
            meta.className = "event-meta";
            const ruleLabel = event.rule_name || event.rule_id;
            meta.textContent = `Rule ${ruleLabel} | user ${event.user_id} | channel ${event.channel_id} | ${event.timestamp}`;
            row.appendChild(meta);
            const message = document.createElement("div");
            message.className = "event-message";
            message.textContent = event.text || "(no message text)";
            row.appendChild(message);
            container.appendChild(row);
          });
      }

      async function saveConfig() {
        await apiFetch("/config", {
          method: "POST",
          body: JSON.stringify(configState.config),
        });
        await refreshAll();
      }

      async function refreshAll() {
        await Promise.all([loadConfig(), loadState(), loadStatus()]);
        renderRules();
        renderEvents();
        const throttle = document.getElementById("throttle-seconds");
        throttle.value = configState.config.notification_settings.throttle_seconds || 30;
      }

      async function lookup(kind, query, targetEl) {
        const res = await apiFetch(`/lookup/${kind}?query=${encodeURIComponent(query)}`);
        const data = await res.json();
        targetEl.innerHTML = "";
        data.results.forEach((item) => {
          const row = document.createElement("div");
          row.className = "lookup-item";
          const label = kind === "users"
            ? `${item.name} (${item.real_name || item.display_name || "no name"})`
            : `${item.name || item.user} ${item.is_private ? "(private)" : ""}`;
          row.innerHTML = `<span>${label}</span>`;
          const btn = document.createElement("button");
          btn.textContent = "Use";
          btn.className = "secondary";
          btn.addEventListener("click", () => {
            if (kind === "users") {
              document.getElementById("user-id").value = item.id;
            } else {
              document.getElementById("channel-id").value = item.id;
            }
          });
          row.appendChild(btn);
          targetEl.appendChild(row);
        });
      }

      document.getElementById("rule-form").addEventListener("submit", (event) => {
        event.preventDefault();
        const newRule = {
          id: `rule-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
          name: document.getElementById("rule-name").value.trim() || "Unnamed rule",
          event_type: "message_posted",
          user_id: document.getElementById("user-id").value.trim(),
          channel_id: document.getElementById("channel-id").value.trim(),
          surface: document.getElementById("rule-surface").checked,
          notify_assistant: document.getElementById("rule-notify").checked,
          notify_include_message: document.getElementById("rule-notify-message").checked,
          enabled: document.getElementById("rule-enabled").checked,
        };
        if (!configState.config) {
          configState.config = { rules: [], notification_settings: { throttle_seconds: 30 } };
        }
        configState.config.rules.push(newRule);
        saveConfig();
        event.target.reset();
        document.getElementById("event-type").value = "message_posted";
      });

      document.getElementById("start-listener").addEventListener("click", async () => {
        await apiFetch("/listener/start", { method: "POST" });
        await loadStatus();
      });

      document.getElementById("stop-listener").addEventListener("click", async () => {
        await apiFetch("/listener/stop", { method: "POST" });
        await loadStatus();
      });

      document.getElementById("reset-state").addEventListener("click", async () => {
        await apiFetch("/state/reset", { method: "POST" });
        await loadState();
        renderRules();
        renderEvents();
      });

      document.getElementById("save-settings").addEventListener("click", async () => {
        const throttleValue = parseInt(document.getElementById("throttle-seconds").value, 10) || 0;
        configState.config.notification_settings.throttle_seconds = throttleValue;
        await saveConfig();
      });

      document.getElementById("user-lookup").addEventListener("click", async () => {
        const query = document.getElementById("user-query").value.trim();
        if (!query) return;
        await lookup("users", query, document.getElementById("user-results"));
      });

      document.getElementById("channel-lookup").addEventListener("click", async () => {
        const query = document.getElementById("channel-query").value.trim();
        if (!query) return;
        await lookup("channels", query, document.getElementById("channel-results"));
      });

      window.addEventListener("load", async () => {
        try {
          await refreshAll();
          setInterval(async () => {
            await loadState();
            renderRules();
            renderEvents();
          }, 5000);
        } catch (err) {
          const banner = document.createElement("div");
          banner.className = "panel";
          banner.style.borderColor = "var(--danger)";
          banner.textContent = err.message || "Failed to load dashboard.";
          document.body.prepend(banner);
        }
      });
    </script>
  </body>
</html>
